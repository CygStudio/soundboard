name: Deploy CYG Pages

on:
  pull_request:
    paths:
      - ".github/workflows/deploy-cyg-pages.yml"
      - "apps/cyg/**"
      - "assets/**"
      - "packages/core/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vite.shared.ts"
      - "vitest.shared.ts"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cyg-pages.yml"
      - "apps/cyg/**"
      - "assets/**"
      - "packages/core/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vite.shared.ts"
      - "vitest.shared.ts"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cyg-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck CYG
        run: pnpm --filter @soundboard/cyg typecheck

      - name: Lint CYG
        run: pnpm --filter @soundboard/cyg lint

      - name: Test CYG
        run: pnpm --filter @soundboard/cyg test

      - name: Build CYG for Pages
        run: pnpm --filter @soundboard/cyg build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/cyg/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
