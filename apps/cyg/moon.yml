project:
  type: application

language: typescript
dependsOn:
  - core

tasks:
  build:
    command: pnpm
    args: ["build"]
    deps:
      - core:build
  dev:
    command: pnpm
    args: ["dev"]
  lint:
    command: pnpm
    args: ["lint"]
  test:
    command: pnpm
    args: ["test"]
  typecheck:
    command: pnpm
    args: ["typecheck"]
